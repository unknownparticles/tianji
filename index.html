
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天机卦 - 传统周易卜卦</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #fcfaf2;
        }
        .chinese-border {
            border-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png") 30 round;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake {
            animation: shake 0.5s infinite;
        }

        /* 硬币翻转动画 - 参考 Ayokanmi-Adejola/Flip-The-Coin */
        @keyframes coinFlip {
            0% {
                transform: translateY(0) rotateY(0deg);
            }
            50% {
                transform: translateY(-80px) rotateY(540deg);
            }
            70% {
                transform: translateY(-100px) rotateY(720deg);
            }
            85% {
                transform: translateY(-40px) rotateY(900deg);
            }
            92% {
                transform: translateY(-20px) rotateY(990deg);
            }
            100% {
                transform: translateY(0) rotateY(1080deg);
            }
        }
        .animate-coin-flip {
            animation: coinFlip 1.2s cubic-bezier(.68,-0.55,.27,1.55) forwards;
        }

        /* 硬币落地弹跳 */
        @keyframes coinLand {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-12px) scale(1.05); }
            50% { transform: translateY(0) scale(0.97); }
            70% { transform: translateY(-5px) scale(1.02); }
            100% { transform: translateY(0) scale(1); }
        }
        .animate-coin-land {
            animation: coinLand 0.3s ease-out;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body class="min-h-screen">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
